name: "DPI Node"

services:
  db:
    image: mysql:8.4.7
    container_name: mysql8_container_frontiers
    hostname: mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: frontiers
      MYSQL_PASSWORD: frontiers
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -h 127.0.0.1 -u frontiers -pfrontiers --silent || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 30s
    ports:
      - "3333:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init:/docker-entrypoint-initdb.d

  dpi-node-provider:
    image: twinfoundation/twin-node:0.0.3-next.67
    # Local build (only needed when Docker Hub lags the refactor — kept for reference):
    # build:
    #   context: ../twin-node
    #   dockerfile: apps/node/tests/kenyaCommunityUseCaseDefaultArbiter/Dockerfile
    container_name: dpi_node_provider
    hostname: dpi.provider
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3010:3000"
    env_file:
      - ./environment/common/.env
      - ./environment/provider/.env.provider
    volumes:
      - node_provider_data:/var/lib/twin
      - ./environment/common/.env.bootstrap:/app/.env.bootstrap
      - ./environment/provider/.env.bootstrap.provider:/app/.env.bootstrap.provider
      - ./apps/dataspace-example-app:/app/node_modules/@twin-community.org/dataspace-example-app
      - ./dataset:/app/data
    command: |
      sh -c 'node src/index.js --env-prefix=DPI_NODE_'

  dpi-node-consumer:
    image: twinfoundation/twin-node:0.0.3-next.67
    container_name: dpi_node_consumer
    hostname: dpi.consumer
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "3020:3000"
    env_file:
      - ./environment/common/.env
      - ./environment/consumer/.env.consumer
    volumes:
      - node_consumer_data:/var/lib/twin
      - ./environment/common/.env.bootstrap:/app/.env.bootstrap
      - ./environment/consumer/.env.bootstrap.consumer:/app/.env.bootstrap.consumer
      - ./apps/consumer-client:/app/node_modules/@twin-community.org/consumer-client
      - ./dataset:/app/data
    command: |
      sh -c 'node src/index.js --env-prefix=DPI_NODE_'

volumes:
  mysql_data:
  node_consumer_data:
  node_provider_data:
